<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | INTOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --azul-deep: #020d1c; --azul-primario: #004a99; --azul-neon: #00d2ff; --blanco: #ffffff; }
        body { background: var(--azul-deep); color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 1150px; margin: 0 auto; display: none; }
        #login-box { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 30px; margin-bottom: 30px; }
        
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.75rem; }
        .btn-neon { background: var(--azul-neon); color: var(--azul-deep); }
        .btn-neon:hover { box-shadow: 0 0 20px var(--azul-neon); transform: scale(1.05); }
        .btn-add { font-size: 1rem; padding: 15px 40px; margin-bottom: 30px; display: block; width: fit-content; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th { text-align: left; color: var(--azul-neon); padding: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .bg-success { background: #22c55e; color: white; }
        .bg-danger { background: #ef4444; color: white; }
        .bg-warning { background: #f59e0b; color: white; }

        .action-btns { display: flex; gap: 8px; }
        .action-btns button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .action-btns button:hover { background: var(--azul-primario); border-color: var(--azul-neon); }

        /* Estilos del Formulario en el Modal */
        .swal-form-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .swal-form-group { margin-bottom: 10px; }
        .swal-form-group label { display: block; font-size: 0.7rem; color: var(--azul-neon); font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .swal-form-group input, .swal-form-group select, .swal-form-group textarea { 
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; color: white; font-family: 'Montserrat'; box-sizing: border-box;
        }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="login-box">
        <img src="https://i.postimg.cc/j5BPB72H/INTOP-BETTER-TOGETHER-transparente-copia.png" height="50">
        <h2 style="margin-top: 20px;">Panel de Administración</h2>
        <input type="password" id="pass" placeholder="Contraseña Maestra" style="width: 100%; max-width: 300px; padding: 12px; border-radius: 10px; border: none; text-align: center;">
        <button class="btn btn-neon" style="margin-top: 15px; width: 300px;" onclick="checkPass()">Entrar al Panel</button>
    </div>

    <div class="container" id="main-ui">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <img src="https://i.postimg.cc/j5BPB72H/INTOP-BETTER-TOGETHER-transparente-copia.png" height="35">
            <button class="btn btn-neon btn-add" onclick="abrirFormulario()">
                <i class="fa-solid fa-plus-circle"></i> AGREGAR PRODUCTO
            </button>
        </div>

        <div class="glass">
            <h3>📦 Gestión de Inventario</h3>
            <table id="products-table">
                <thead>
                    <tr>
                        <th>Producto / Modelo</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; 
        let allProducts = [];

        function checkPass() {
            if(document.getElementById('pass').value === "intop2026") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                cargarProductos();
            } else { Swal.fire('Error', 'Clave incorrecta', 'error'); }
        }

        async function cargarProductos() {
            const res = await fetch(API_URL);
            allProducts = await res.json();
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            body.innerHTML = allProducts.map(p => `
                <tr>
                    <td><b>${p.Producto}</b><br><small style="opacity:0.6">${p.Modelo}</small></td>
                    <td>${p.Categoria || p.Categoría}</td>
                    <td><span class="badge ${p.Visible == 'TRUE' ? 'bg-success' : 'bg-danger'}">${p.Visible == 'TRUE' ? 'Público' : 'Oculto'}</span></td>
                    <td><span class="badge ${p.Stock == 'EN STOCK' ? 'bg-success' : 'bg-warning'}">${p.Stock}</span></td>
                    <td class="action-btns">
                        <button onclick="editarProducto('${p.Modelo}')" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="toggleStatus('${p.Modelo}', 'toggle_visible', '${p.Visible == 'TRUE' ? 'FALSE' : 'TRUE'}')" title="Ocultar/Mostrar"><i class="fa-solid ${p.Visible == 'TRUE' ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                        <button onclick="toggleStatus('${p.Modelo}', 'toggle_stock', '${p.Stock == 'EN STOCK' ? 'AGOTADO' : 'EN STOCK'}')" title="Stock"><i class="fa-solid fa-boxes-stacked"></i></button>
                        <button onclick="borrarProducto('${p.Modelo}')" title="Borrar"><i class="fa-solid fa-trash" style="color:#ef4444"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleStatus(modelo, action, status) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action, Modelo: modelo, status}) });
            setTimeout(() => cargarProductos(), 1000);
        }

        async function borrarProducto(modelo) {
            const confirm = await Swal.fire({ title: '¿Eliminar?', text: "Se borrará del sistema.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if(confirm.isConfirmed) {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: 'delete', Modelo: modelo}) });
                setTimeout(() => cargarProductos(), 1000);
            }
        }

        function abrirFormulario(existingData = null) {
            const isEdit = existingData !== null;
            Swal.fire({
                title: isEdit ? 'Editar Producto' : 'Nuevo Producto',
                width: '800px',
                background: '#020d1c',
                color: '#fff',
                html: `
                    <div class="swal-form-container">
                        <div class="swal-form-group full-width"><label>Nombre del Producto</label><input id="f-prod" value="${isEdit ? existingData.Producto : ''}"></div>
                        <div class="swal-form-group"><label>Categoría</label>
                            <select id="f-cat">
                                <option ${isEdit && existingData.Categoria == 'Bombas Periféricas' ? 'selected' : ''}>Bombas Periféricas</option>
                                <option ${isEdit && existingData.Categoria == 'Bombas Sumergibles' ? 'selected' : ''}>Bombas Sumergibles</option>
                                <option ${isEdit && existingData.Categoria == 'Pozos Profundos' ? 'selected' : ''}>Pozos Profundos</option>
                                <option ${isEdit && existingData.Categoria == 'Tanques' ? 'selected' : ''}>Tanques</option>
                                <option ${isEdit && existingData.Categoria == 'Accesorios' ? 'selected' : ''}>Accesorios</option>
                            </select>
                        </div>
                        <div class="swal-form-group"><label>Modelo (ID)</label><input id="f-mod" value="${isEdit ? existingData.Modelo : ''}" ${isEdit ? 'disabled' : ''}></div>
                        <div class="swal-form-group"><label>Serie</label><input id="f-serie" value="${isEdit ? existingData.Serie : ''}"></div>
                        <div class="swal-form-group"><label>Potencia</label><input id="f-pot" value="${isEdit ? existingData.Potencia : ''}"></div>
                        <div class="swal-form-group"><label>HMAX</label><input id="f-hmax" value="${isEdit ? existingData.HMAX : ''}"></div>
                        <div class="swal-form-group"><label>QMAX</label><input id="f-qmax" value="${isEdit ? existingData.QMAX : ''}"></div>
                        <div class="swal-form-group"><label>Voltaje</label><input id="f-vol" value="${isEdit ? existingData.Voltaje : ''}"></div>
                        <div class="swal-form-group"><label>AMP</label><input id="f-amp" value="${isEdit ? existingData.AMP : ''}"></div>
                        <div class="swal-form-group full-width"><label>URL Imagen</label><input id="f-img" value="${isEdit ? existingData.Imagen_URL : ''}"></div>
                        <div class="swal-form-group full-width"><label>Descripción</label><textarea id="f-desc">${isEdit ? existingData.Descripcion : ''}</textarea></div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: isEdit ? 'Guardar Cambios' : 'Crear Producto',
                preConfirm: () => {
                    const prod = document.getElementById('f-prod').value;
                    const mod = document.getElementById('f-mod').value;
                    if(!prod || !mod) return Swal.showValidationMessage('Nombre y Modelo son obligatorios');
                    return {
                        action: isEdit ? 'edit' : 'add',
                        Producto: prod,
                        Modelo: mod,
                        Categoria: document.getElementById('f-cat').value,
                        Serie: document.getElementById('f-serie').value,
                        Potencia: document.getElementById('f-pot').value,
                        HMAX: document.getElementById('f-hmax').value,
                        QMAX: document.getElementById('f-qmax').value,
                        Voltaje: document.getElementById('f-vol').value,
                        AMP: document.getElementById('f-amp').value,
                        Imagen_URL: document.getElementById('f-img').value,
                        Descripcion: document.getElementById('f-desc').value
                    }
                }
            }).then(result => {
                if(result.isConfirmed) {
                    fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(result.value) });
                    setTimeout(() => cargarProductos(), 1500);
                }
            });
        }

        function editarProducto(modelo) {
            const p = allProducts.find(item => item.Modelo == modelo);
            if(p) abrirFormulario(p);
        }
    </script>
</body>
</html>
