<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | INTOP Suministros</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root {
            --azul-deep: #020d1c;
            --azul-primario: #004a99;
            --azul-neon: #00d2ff;
            --blanco: #ffffff;
            --gris-bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--gris-bg); color: var(--azul-deep); overflow-x: hidden; }

        /* --- NAVBAR --- */
        .nav-header {
            background: rgba(2, 13, 28, 0.98);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .nav-header img { height: 35px; }
        .btn-back {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--azul-neon); }

        /* --- FILTROS --- */
        .filter-section {
            padding: 40px 5% 30px;
            background: white;
            text-align: center;
        }
        .filter-container {
            max-width: 1200px;
            margin: 20px auto 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: 0.3s;
            text-transform: uppercase;
            color: var(--azul-deep);
        }
        .filter-btn.active {
            background: var(--azul-primario);
            color: white;
            border-color: var(--azul-primario);
            box-shadow: 0 8px 20px rgba(0, 74, 153, 0.2);
        }

        /* --- GRID --- */
        .catalog-container {
            padding: 40px 5% 80px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* --- TARJETA --- */
        .p-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            border: 1px solid #f1f5f9;
        }
        .p-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--azul-neon); }
        
        .p-category-tag {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--azul-primario);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            display: block;
        }

        .p-img {
            background: #fff;
            height: 220px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; position: relative;
        }
        .p-img img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .p-info h3 { font-size: 1.15rem; color: var(--azul-deep); margin-bottom: 15px; font-weight: 700; line-height: 1.3; }
        
        .p-specs { width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 0.85rem; }
        .p-specs td { padding: 10px 0; border-bottom: 1px dashed #e2e8f0; color: var(--text-light); }
        .p-specs td i { color: var(--azul-primario); width: 22px; margin-right: 5px; text-align: center; }
        .p-specs td:nth-child(2) { text-align: right; font-weight: 700; color: var(--azul-deep); }

        .btn-ficha {
            background: var(--azul-deep);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
            transition: 0.3s;
            margin-top: auto;
        }
        .btn-ficha:hover { background: var(--azul-primario); transform: scale(1.02); }

        /* Loader */
        #loader-container { text-align: center; padding: 100px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--azul-neon); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* SweetAlert Table */
        .swal-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .swal-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .swal-label { font-weight: 700; color: var(--azul-primario); width: 45%; }

        /* Estilos para el Modal Customizado */
.intop-swal-popup {
    background: rgba(2, 13, 28, 0.95) !important;
    backdrop-filter: blur(15px) !important;
    border: 1px solid rgba(0, 210, 255, 0.3) !important;
    border-radius: 30px !important;
    color: white !important;
}

.modal-header-intop {
    text-align: center;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
}

.modal-header-intop i {
    font-size: 3rem;
    color: var(--azul-neon);
    filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
    margin-bottom: 15px;
}

.tech-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.tech-item {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
}

.tech-item:hover {
    background: rgba(0, 210, 255, 0.1);
    border-color: var(--azul-neon);
}

.tech-item label {
    display: block;
    font-size: 0.65rem;
    color: var(--azul-neon);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 5px;
}

.tech-item span {
    font-size: 1rem;
    font-weight: 600;
    color: white;
}

.modal-footer-info {
    margin-top: 25px;
    font-size: 0.8rem;
    color: #cbd5e1;
    text-align: center;
    font-style: italic;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 15px;
}

@media (max-width: 480px) {
    .tech-grid { grid-template-columns: 1fr; }
}
    </style>
</head>
<body>

    <nav class="nav-header">
        <img src="https://i.postimg.cc/j5BPB72H/INTOP-BETTER-TOGETHER-transparente-copia.png" alt="INTOP Logo">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> VOLVER</a>
    </nav>

    <div class="filter-section">
        <h2 style="font-weight: 800; letter-spacing: -1px; font-size: 2.2rem;">NUESTRO <span style="color: var(--azul-primario);">STOCK</span></h2>
        <div class="filter-container" id="category-filters">
            <button class="filter-btn active" onclick="filterProducts('Todos', this)">Todos</button>
        </div>
    </div>

    <div class="catalog-container">
        <div id="loader-container">
            <div class="spinner"></div>
            <p>Conectando con la base de datos...</p>
        </div>
        <div class="product-grid" id="product-grid"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbywQxhAKkPPGE6CCXzcECj7qP1ikcbyzJ7loHa_IikFKVaA-BpILMHlczyXuiq51ndy4A/exec";
        let allProducts = [];

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Normalizar datos para evitar el error "undefined"
                allProducts = data.map(p => ({
                    ID: p.ID || "",
                    Nombre: p.Nombre || p.Modelo || "Producto INTOP", // Si no hay nombre usa modelo
                    Categoria: p.Categoría || p.Categoria || "General",
                    Serie: p.Serie || "N/A",
                    Potencia: p.Potencia || "N/A",
                    Voltaje: p.Voltaje || "N/A",
                    Imagen: p.Imagen_URL || p.Imagen || "https://via.placeholder.com/300",
                    Descripcion: p.Descripción || p.Descripcion || "",
                    HMAX: p.HMAX || "N/A",
                    QMAX: p.QMAX || "N/A",
                    AMP: p.AMP || "N/A",
                    Succ_Desc: p.Succ_Desc || "N/A"
                }));

                renderFilters(allProducts);
                renderProducts(allProducts);
                document.getElementById('loader-container').style.display = 'none';
            } catch (error) {
                document.getElementById('loader-container').innerHTML = "<p>Error al cargar el inventario.</p>";
            }
        }

        function renderFilters(products) {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(products.map(p => p.Categoria))];
            
            categories.forEach(cat => {
                if(cat && cat !== "General") {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = cat;
                    btn.onclick = () => filterProducts(cat, btn);
                    container.appendChild(btn);
                }
            });
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = "p-card";
                card.setAttribute('data-aos', 'fade-up');
                
                card.innerHTML = `
                    <span class="p-category-tag">${p.Categoria}</span>
                    <div class="p-img">
                        <img src="${p.Imagen}" alt="${p.Nombre}">
                    </div>
                    <div class="p-info">
                        <h3>${p.Nombre}</h3>
                        <table class="p-specs">
                            <tr><td><i class="fa-solid fa-microchip"></i> Serie:</td><td>${p.Serie}</td></tr>
                            <tr><td><i class="fa-solid fa-bolt"></i> Potencia:</td><td>${p.Potencia}</td></tr>
                            <tr><td><i class="fa-solid fa-plug"></i> Voltaje:</td><td>${p.Voltaje}</td></tr>
                        </table>
                        <button class="btn-ficha" onclick='verDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                            <i class="fa-solid fa-file-lines" style="margin-right:8px;"></i> Ficha Técnica
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            AOS.init();
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filtered = category === 'Todos' 
                ? allProducts 
                : allProducts.filter(p => p.Categoria === category);
            
            renderProducts(filtered);
        }

        function verDetalle(p) {
    Swal.fire({
        customClass: {
            popup: 'intop-swal-popup'
        },
        showConfirmButton: true,
        confirmButtonText: '<i class="fa-solid fa-circle-check"></i> ENTENDIDO',
        confirmButtonColor: '#00d2ff',
        width: '600px',
        html: `
            <div class="modal-header-intop">
                <i class="fa-solid fa-microchip"></i>
                <h2 style="color:white; font-weight:800; font-size:1.5rem; margin-bottom:5px;">FICHA TÉCNICA</h2>
                <span style="color:var(--azul-neon); font-size:0.8rem; font-weight:600; letter-spacing:2px;">${p.Categoria}</span>
            </div>

            <h3 style="color:white; text-align:center; margin-bottom:20px;">${p.Nombre}</h3>

            <div class="tech-grid">
                <div class="tech-item">
                    <label><i class="fa-solid fa-barcode"></i> Serie/Modelo</label>
                    <span>${p.Serie} / ${p.Modelo || 'N/A'}</span>
                </div>
                <div class="tech-item">
                    <label><i class="fa-solid fa-bolt"></i> Potencia</label>
                    <span>${p.Potencia}</span>
                </div>
                <div class="tech-item">
                    <label><i class="fa-solid fa-droplet"></i> Caudal Máx (Q)</label>
                    <span>${p.QMAX}</span>
                </div>
                <div class="tech-item">
                    <label><i class="fa-solid fa-arrow-up-from-ground-water"></i> Altura Máx (H)</label>
                    <span>${p.HMAX}</span>
                </div>
                <div class="tech-item">
                    <label><i class="fa-solid fa-plug"></i> Voltaje</label>
                    <span>${p.Voltaje}</span>
                </div>
                <div class="tech-item">
                    <label><i class="fa-solid fa-ruler-combined"></i> Succión/Desc.</label>
                    <span>${p.Succ_Desc}</span>
                </div>
            </div>

            <div style="margin-top:20px; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; text-align:left;">
                <label style="color:var(--azul-neon); font-size:0.7rem; font-weight:700;">DESCRIPCIÓN ADICIONAL:</label>
                <p style="color:#cbd5e1; font-size:0.85rem; margin-top:5px;">${p.Descripcion || 'Equipo de alto rendimiento bajo estándares industriales INTOP.'}</p>
            </div>

            <div class="modal-footer-info">
                * Datos sujetos a pruebas de laboratorio bajo condiciones controladas.
            </div>
        `
    });
}

        fetchProducts();
    </script>
</body>
</html>
