<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo por Series | INTOP</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>

        .comp-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            font-size: 0.75rem; 
            color: white; 
        }
        .comp-table th { 
            background: rgba(0, 74, 153, 0.8); 
            padding: 12px 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; 
            font-size: 0.6rem;
            white-space: nowrap; 
        }
        .comp-table td { 
            padding: 12px 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
        }
        
        :root {
            --azul-deep: #020d1c;
            --azul-primario: #004a99;
            --azul-neon: #00d2ff;
            --blanco: #ffffff;
            --gris-bg: #f8fafc;
            --rojo-alert: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--gris-bg); color: var(--azul-deep); overflow-x: hidden; }

        /* --- NAVBAR --- */
        .nav-header { background: rgba(2, 13, 28, 0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .nav-header img { height: 35px; }
        .btn-back { color: white; text-decoration: none; font-weight: 600; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back:hover { color: var(--azul-neon); }

        /* --- FILTROS --- */
        .filter-section { padding: 40px 5% 30px; background: white; text-align: center; }
        
        /* Nuevos Filtros de Marca */
        .brand-filters { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .brand-btn { 
            background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 10px 25px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            height: 60px; transition: 0.3s; opacity: 0.6; filter: grayscale(100%);
        }
        .brand-btn img { max-height: 35px; max-width: 120px; object-fit: contain; }
        .brand-btn:hover { border-color: var(--azul-primario); opacity: 0.8; }
        .brand-btn.active { border-color: var(--azul-primario); opacity: 1; filter: grayscale(0%); box-shadow: 0 10px 20px rgba(0, 74, 153, 0.1); }
        .brand-btn.all-brands { font-weight: 800; color: var(--azul-deep); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .filter-container { max-width: 1200px; margin: 20px auto 0; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .filter-btn { padding: 10px 22px; border-radius: 50px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: 0.3s; text-transform: uppercase; color: var(--azul-deep); }
        .filter-btn.active { background: var(--azul-primario); color: white; border-color: var(--azul-primario); box-shadow: 0 8px 20px rgba(0, 74, 153, 0.2); }

        /* --- GRID --- */
        .catalog-container { padding: 40px 5% 80px; max-width: 1300px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        /* --- TARJETA POR SERIE --- */
        .p-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s; display: flex; flex-direction: column; border: 1px solid #f1f5f9; position: relative; }
        .p-card:hover { border-color: var(--azul-neon); transform: translateY(-5px); }
        
        /* Switcher de Modelos */
        .model-switcher { display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 8px 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .model-switcher span { font-size: 0.65rem; font-weight: 800; color: var(--azul-primario); text-transform: uppercase; }
        .btn-nav-model { background: var(--azul-primario); color: white; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 0.7rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-nav-model:hover { background: var(--azul-neon); color: var(--azul-deep); }

        .p-category-tag { font-size: 0.6rem; font-weight: 700; color: var(--azul-primario); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .stock-badge { position: absolute; top: 20px; right: 20px; background: var(--rojo-alert); color: white; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800; z-index: 5; text-transform: uppercase; }

        .p-img { height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.3s; }
        .p-img img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .p-img.out-stock { opacity: 0.4; filter: grayscale(1); }

        .p-info h3 { font-size: 1.1rem; color: var(--azul-deep); margin-bottom: 2px; font-weight: 800; }
        .serie-label { font-size: 0.85rem; color: var(--azul-primario); font-weight: 700; margin-bottom: 15px; display: block; }
        
        .p-specs { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.8rem; }
        .p-specs td { padding: 8px 0; border-bottom: 1px dashed #e2e8f0; color: #64748b; }
        .p-specs td i { color: var(--azul-primario); width: 20px; }
        .p-specs td:nth-child(2) { text-align: right; font-weight: 700; color: var(--azul-deep); }

        .row-potencia { background: rgba(0, 210, 255, 0.05); }
        .potencia-badge { background: var(--azul-primario); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-left: 3px; display: inline-block; font-weight: 700; }

        .btn-ficha { background: var(--azul-deep); color: white; border: none; padding: 14px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; margin-top: auto; letter-spacing: 1px; }
        .btn-ficha:hover { background: var(--azul-primario); }

        /* --- MODAL --- */
        .intop-swal-popup { background: rgba(2, 13, 28, 0.98) !important; color: white !important; border-radius: 30px !important; border: 1px solid var(--azul-neon) !important; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="nav-header">
        <img src="https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/Intop%2FIntopLogo.png?alt=media&token=a6a89a04-48c6-4e95-b9d0-fed975fd8c49" alt="INTOP Logo">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> INICIO</a>
    </nav>

    <div class="filter-section">
        <h2 style="font-weight: 800; font-size: 2.2rem;">CATÁLOGO <span style="color: var(--azul-primario);">COMPLETO</span></h2>
        
        <div class="brand-filters">
            <button class="brand-btn all-brands active" onclick="filterByBrand('Todas', this)">Todas las Marcas</button>
            <button class="brand-btn" onclick="filterByBrand('Intop', this)">
                <img src="https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/Intop%2FIntopLogo.png?alt=media&token=a6a89a04-48c6-4e95-b9d0-fed975fd8c49" alt="INTOP">
            </button>
            <button class="brand-btn" onclick="filterByBrand('Luckypro', this)">
                <img src="https://firebasestorage.googleapis.com/v0/b/d-clan-athletes.firebasestorage.app/o/Intop%2FLuckyLogo.png?alt=media&token=7d6039ea-f79a-4c32-8770-18c7f023de4d" alt="LuckyPro">
            </button>
        </div>

        <div class="filter-container" id="category-filters">
            <button class="filter-btn active" onclick="filterByCat('Todos', this)">Todas las Categorías</button>
        </div>
    </div>

    <div class="catalog-container">
        <div id="loader-container" style="text-align: center; padding: 50px;">
            <div style="width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid var(--azul-neon); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <p>Sincronizando modelos por serie...</p>
        </div>
        <div class="product-grid" id="product-grid"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbywQxhAKkPPGE6CCXzcECj7qP1ikcbyzJ7loHa_IikFKVaA-BpILMHlczyXuiq51ndy4A/exec";
        
        let allVisibleProducts = []; // Guarda todos los productos crudos
        let currentBrand = 'Todas';  // Marca seleccionada actualmente
        let currentCat = 'Todos';    // Categoría seleccionada actualmente
        let groupedBySerie = {};     // Productos agrupados (se recalcula)

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Guardamos solo los visibles
                allVisibleProducts = data.filter(p => String(p.Visible).toUpperCase() === "TRUE");

                // Inicializamos la vista
                applyFilters();
                
                document.getElementById('loader-container').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loader-container').innerHTML = "<p>Error de conexión.</p>";
            }
        }

        // NUEVA FUNCIÓN: Aplica ambos filtros (Marca y Categoría)
        function applyFilters() {
            // 1. Filtrar por Marca
            let filteredArray = allVisibleProducts;
            if (currentBrand !== 'Todas') {
                filteredArray = filteredArray.filter(p => {
                    // Verificamos si la columna existe y coincide (ignorando mayúsculas/minúsculas)
                    const brand = String(p.Marca || "").toLowerCase();
                    return brand === currentBrand.toLowerCase();
                });
            }

            // 2. Extraer categorías DISPONIBLES para la marca seleccionada
            renderFilters(filteredArray);

            // 3. Filtrar por Categoría
            if (currentCat !== 'Todos') {
                filteredArray = filteredArray.filter(p => (p.Categoria || p.Categoría) === currentCat);
            }

            // 4. Agrupar por Serie y Renderizar
            groupedBySerie = filteredArray.reduce((acc, p) => {
                const key = p.Serie || "Genérico";
                if (!acc[key]) acc[key] = [];
                acc[key].push(p);
                return acc;
            }, {});

            renderGroups(groupedBySerie);
        }

        // Lógica del Botón de Marca
        function filterByBrand(brandName, btnElement) {
            document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentBrand = brandName;
            currentCat = 'Todos'; // Resetear categoría al cambiar de marca
            
            // Visualmente resetear el botón de categoría a "Todos"
            const catContainer = document.getElementById('category-filters');
            if (catContainer.firstElementChild) {
                 // Dejar el estado visual para después de renderFilters
            }
            
            applyFilters();
        }

        // Lógica del Botón de Categoría
        function filterByCat(catName, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else {
                // Si se llama sin botón (reseteo interno), buscamos el botón "Todos"
                const allBtn = document.querySelector('.filter-btn');
                if(allBtn) allBtn.classList.add('active');
            }
            
            currentCat = catName;
            applyFilters();
        }

        function renderFilters(dataForBrand) {
            const container = document.getElementById('category-filters');
            container.innerHTML = `<button class="filter-btn ${currentCat === 'Todos' ? 'active' : ''}" onclick="filterByCat('Todos', this)">Todas las Categorías</button>`;
            
            const categories = [...new Set(dataForBrand.map(p => p.Categoria || p.Categoría))];
            categories.forEach(cat => {
                if(cat) {
                    const btn = document.createElement('button');
                    btn.className = `filter-btn ${currentCat === cat ? 'active' : ''}`;
                    btn.innerText = cat;
                    btn.onclick = function() { filterByCat(cat, this); };
                    container.appendChild(btn);
                }
            });
        }

        function renderGroups(groups) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";

            if(Object.keys(groups).length === 0) {
                grid.innerHTML = `<p style="text-align:center; width:100%; grid-column:1/-1;">No hay productos disponibles para este filtro.</p>`;
                return;
            }

            Object.keys(groups).forEach(serieName => {
                const models = groups[serieName];
                const card = document.createElement('div');
                card.className = "p-card";
                card.setAttribute('data-aos', 'fade-up');
                
                renderCardContent(card, models, 0);
                grid.appendChild(card);
            });
            AOS.init();
        }

        function renderCardContent(card, models, index) {
            const p = models[index];
            const hasMultiple = models.length > 1;
            const isOut = p.Stock === "AGOTADO";

            // Procesar potencias en badges
            const potenciasHTML = p.Potencia ? p.Potencia.split(',').map(pot => `<span class="potencia-badge">${pot.trim()}</span>`).join('') : 'N/A';

            card.innerHTML = `
                ${isOut ? '<div class="stock-badge">Agotado</div>' : ''}
                <span class="p-category-tag">${p.Categoria || p.Categoría}</span>
                
                ${hasMultiple ? `
                <div class="model-switcher">
                    <button class="btn-nav-model" onclick="changeModel(this, -1)"><i class="fa-solid fa-chevron-left"></i></button>
                    <span>MODELO ${index + 1} DE ${models.length}</span>
                    <button class="btn-nav-model" onclick="changeModel(this, 1)"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                ` : '<div style="height:40px"></div>'}

                <div class="p-img ${isOut ? 'out-stock' : ''}">
                    <img src="${p.Imagen_URL || p.Imagen}" alt="${p.Producto}">
                </div>

                <div class="p-info">
                    <h3>${p.Producto || p.Nombre}</h3>
                    <span class="serie-label">SERIE: ${p.Serie}</span>
                    
                    <table class="p-specs">
                        <tr><td><i class="fa-solid fa-barcode"></i> Modelo:</td><td>${p.Modelo}</td></tr>
                        <tr class="row-potencia"><td><i class="fa-solid fa-bolt"></i> Potencia:</td><td>${potenciasHTML}</td></tr>
                        ${p.HMAX ? `<tr><td><i class="fa-solid fa-arrow-up-wide-short"></i> Altura (H):</td><td>${p.HMAX}</td></tr>` : ''}
                        ${p.QMAX ? `<tr><td><i class="fa-solid fa-droplet"></i> Caudal (Q):</td><td>${p.QMAX}</td></tr>` : ''}
                    </table>

                    <button class="btn-ficha" onclick='verFichaComparativa("${p.Serie}")'>
                        <i class="fa-solid fa-table-list" style="margin-right:8px;"></i> VER FICHA TECNICA
                    </button>
                </div>
            `;

            card.dataset.models = JSON.stringify(models);
            card.dataset.currentIndex = index;
        }

        function changeModel(btn, delta) {
            const card = btn.closest('.p-card');
            const models = JSON.parse(card.dataset.models);
            let index = parseInt(card.dataset.currentIndex);
            index += delta;
            if (index < 0) index = models.length - 1;
            if (index >= models.length) index = 0;
            renderCardContent(card, models, index);
        }

        function verFichaComparativa(serieName) {
            const models = groupedBySerie[serieName];
            
            let rows = models.map(m => `
                <tr>
                    <td style="text-align:left; font-weight:700; color:var(--azul-neon);">${m.Modelo}</td>
                    <td>${m.Potencia || '-'}</td>
                    <td>${m.HMAX || '-'}</td>
                    <td>${m.QMAX || '-'}</td>
                    <td>${m.Succ_Desc || '-'}</td>
                    <td>${m.AMP || '-'}</td>
                    <td>${m.Voltaje || '-'}</td>
                </tr>
            `).join('');

            Swal.fire({
                customClass: { popup: 'intop-swal-popup' },
                width: '950px',
                confirmButtonText: 'ENTENDIDO',
                confirmButtonColor: '#00d2ff',
                html: `
                    <div class="modal-header-intop">
                        <h2 style="color:white; font-weight:800; text-transform:uppercase;">SERIE ${serieName}</h2>
                        <p style="color:var(--azul-neon); font-size:0.75rem; letter-spacing:2px; font-weight:700; padding:10;">${models[0].Producto}</p>
                    </div>
                    
                    <div class="modal-img-container" style="background:white; border-radius:20px; padding:20px; margin-bottom:20px;">
                        <img src="${models[0].Imagen_URL || models[0].Imagen}" style="max-height:180px;">
                    </div>

                    <div style="overflow-x:auto; margin-bottom:20px;">
                        <table class="comp-table">
                            <thead>
                                <tr>
                                    <th style="text-align:left;">Modelo Ref.</th>
                                    <th>Potencia</th>
                                    <th>Altura (H)</th>
                                    <th>Caudal (Q)</th>
                                    <th>Succión / Desc.</th>
                                    <th>AMP</th>
                                    <th>Voltaje</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    
                    <div style="text-align:left; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; border: 1px solid rgba(0, 210, 255, 0.2);">
                        <label style="color:var(--azul-neon); font-size:0.65rem; font-weight:800; text-transform:uppercase; display:block; margin-bottom:8px;">
                            <i class="fa-solid fa-circle-info"></i> Información del Producto:
                        </label>
                        <p style="font-size:0.85rem; color:#cbd5e1; line-height:1.6; font-weight:400;">
                            ${models[0].Descripcion || 'Esta serie está diseñada bajo los más altos estándares de calidad para garantizar eficiencia y durabilidad en aplicaciones industriales.'}
                        </p>
                    </div>
                    
                    <div class="modal-footer-info" style="margin-top:15px;">
                        * Las especificaciones de Succión y Amperaje pueden variar según la instalación.
                    </div>
                `
            });
        }

        fetchProducts();
    </script>
</body>
</html>
